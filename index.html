<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2026 Audio Diary</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <h1>2026</h1>
    <p>One recording a day.</p>
  </header>

  <div id="stats" style="text-align:center; margin-bottom:20px;">
    <button id="analyze-btn">Analyze Audio</button>
    <p id="stats-output"></p>
    <canvas id="stats-chart" width="600" height="220" style="display:none; margin:12px auto 0; max-width:100%;"></canvas>
    <canvas id="stats-cdf"   width="600" height="180" style="display:none; margin:8px auto 0; max-width:100%;"></canvas>
    <canvas id="stats-dow"   width="600" height="180" style="display:none; margin:8px auto 0; max-width:100%;"></canvas>
  </div>

  <main id="months"></main>

  <!-- player -->
  <div id="player" class="hidden">
    <div class="player-card">
        <button id="close">×</button>
        <p id="player-date"></p>
        <audio id="audio" controls ></audio>
        <button id="record-btn">🎙 Record</button>
        <a id="download-link" style="display:none">⬇ Download</a>
    </div>
   </div>
  <script src="calendar.js"></script>
</body>
</html>
